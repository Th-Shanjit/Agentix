# Optional: scheduled JSearch ingest. Configure repo secrets:
#   CRON_WEBHOOK_SECRET — same as production CRON_WEBHOOK_SECRET
#   INGEST_URL — full URL to POST, e.g. https://your-app.vercel.app/api/webhooks/ingest-jobs
#   INGEST_JSON — optional POST body, e.g. {"query":"developer remote","page":1}

name: Ingest jobs (JSearch)

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: POST ingest webhook
        env:
          SECRET: ${{ secrets.CRON_WEBHOOK_SECRET }}
          URL: ${{ secrets.INGEST_URL }}
          BODY: ${{ secrets.INGEST_JSON }}
        run: |
          if [ -z "$SECRET" ] || [ -z "$URL" ]; then
            echo "Skip: set CRON_WEBHOOK_SECRET and INGEST_URL repository secrets."
            exit 0
          fi
          if [ -z "$BODY" ]; then
            BODY='{"query":"software engineer remote","page":1}'
          fi
          curl -sS -X POST "$URL" \
            -H "Content-Type: application/json" \
            -H "x-agentix-secret: $SECRET" \
            -d "$BODY" \
            -w "\nHTTP %{http_code}\n"
