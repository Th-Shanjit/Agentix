name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          # Prisma loads schema at build time; use a placeholder — no DB connection is opened for `next build`.
          POSTGRES_PRISMA_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
          AUTH_SECRET: ci-build-placeholder-secret-min-32-characters-long
